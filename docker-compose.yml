services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: effective_mobile_backend
    expose:
      - "8080"
    networks:
      - effective_mobile_network

  nginx:
    image: nginx:1.27-alpine
    container_name: effective_mobile_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - effective_mobile_network

networks:
  effective_mobile_network:
    driver: bridge